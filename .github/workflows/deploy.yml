name: Deploy repository to Github Pages

on:
  push:
    paths:
      - 'plugins/**'
      - 'README.md'
      - '.github/workflows/deploy.yml'
    branches:
      - main
      - dev
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: '0'
      - name: Build both release channels
        run: |
          set -euo pipefail
          git fetch origin main dev
          rm -rf ../stash-plugins-main ../stash-plugins-dev _site
          git worktree add ../stash-plugins-main origin/main
          git worktree add ../stash-plugins-dev origin/dev
          chmod +x ../stash-plugins-main/build_site.sh
          chmod +x ../stash-plugins-dev/build_site.sh
          ../stash-plugins-main/build_site.sh "$GITHUB_WORKSPACE/_site/main" "stable"
          ../stash-plugins-dev/build_site.sh "$GITHUB_WORKSPACE/_site/dev" "dev"
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
