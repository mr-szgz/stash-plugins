name: Downloadman
description: Download manager for Stash scenes with a JS UI and inline path-mapping validation.
version: 1.1
ui:
  javascript:
    - downloadman.js
exec:
  - python
  - "{pluginDir}/downloadman.py"
interface: raw
errLog: info
settings:
  cacheSizeMB:
    displayName: Scene Cache Size (MB)
    description: Total persistent scene metadata cache size in MB. Default is 500. Set to 0 to disable caching.
    type: NUMBER
  pathMappings:
    displayName: Path Mappings
    description: 'JSON array of mapping objects such as [{"orig":"Z:/stash","local":"D:/stash"}].'
    type: STRING
tasks:
  - name: inspect_configuration
    description: Show the effective Python-side Downloadman configuration and mapping summary.
    defaultArgs:
      operation: inspect_configuration
  - name: validate_path_mappings
    description: Validate Downloadman's configured inline path mappings.
    defaultArgs:
      operation: validate_path_mappings
